<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">

  <title>仓库检测</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {

  <style>
    * {
      font-family: 'Inter', sans-serif;
    }

    /* 浅色模式（默认） */
    body {
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 50%, #f1f5f9 100%);
      min-height: 100vh;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .repo-card:hover {
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    }

    /* 深色模式 */
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
      }

      .glass-card {
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .repo-card:hover {
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      }
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .repo-card {
      transition: all 0.3s ease;
    }

    .repo-card:hover {
      transform: translateY(-4px);
    }

    .platform-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>

  <script>
    // 设置当前年份
    document.getElementById('currentYear').textContent = new Date().getFullYear();

    // ============================================
    // 配置：修改为你的 Worker API 地址
    // ============================================
    const API_BASE_URL = ''; // 留空表示同源，或填写如 'https://your-worker.your-subdomain.workers.dev'

    async function loadData() {
      try {
        const apiUrl = API_BASE_URL ? `${API_BASE_URL}/api/repos` : '/api/repos';
        const response = await fetch(apiUrl);
        const result = await response.json();

        if (result.code !== 200) {
          throw new Error(result.message);
        }

        const data = result.data;

        // 更新统计
        document.getElementById('totalCount').textContent = data.total;
        document.getElementById('githubCount').textContent = data.github;
        document.getElementById('giteeCount').textContent = data.gitee || 0;
        document.getElementById('gitlabCount').textContent = data.gitlab || 0;
        document.getElementById('cnbCount').textContent = data.cnb;
        document.getElementById('lastUpdate').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN');

        // 渲染 GitHub 仓库
        const githubRepos = data.repos.filter(r => r.platform === 'github')
          .sort((a, b) => {
            const dateA = a.latestDate ? new Date(a.latestDate).getTime() : 0;
            const dateB = b.latestDate ? new Date(b.latestDate).getTime() : 0;
            return dateB - dateA; // 倒序：最近更新的在前
          });
        document.getElementById('githubRepos').innerHTML = githubRepos.length > 0
          ? githubRepos.map(repo => `
            <div class="glass-card repo-card rounded-xl p-5 cursor-pointer" onclick="window.open('${repo.url}', '_blank')" title="点击打开仓库页面">
              <div class="flex items-start justify-between mb-3">
                <div>
                  <span class="platform-badge bg-purple-100 text-purple-600 dark:bg-purple-500/20 dark:text-purple-400">GitHub</span>
                  <h3 class="text-slate-900 dark:text-white font-semibold mt-2">${repo.name}</h3>
                  <p class="text-slate-500 dark:text-slate-400 text-sm">${repo.branch}</p>
                </div>
                <div class="status-dot ${repo.latestSha ? 'bg-emerald-500 dark:bg-emerald-400' : 'bg-amber-500 dark:bg-amber-400'}"></div>
              </div>
              <div class="space-y-2">
                <div class="flex items-center gap-2 text-sm">
                  <span class="text-slate-500 dark:text-slate-500">最新 SHA:</span>
                  <code class="text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-500/10 px-2 py-0.5 rounded text-xs">${repo.latestSha ? repo.latestSha.substring(0, 8) : '未检测'}</code>
                </div>
                ${repo.latestDate ? `<div class="flex items-center gap-2 text-sm">
                  <span class="text-slate-500 dark:text-slate-500">更新时间:</span>
                  <span class="text-slate-600 dark:text-slate-300">${formatRelativeTime(repo.latestDate)}</span>
                </div>` : ''}
              </div>
            </div>
          `).join('')
          : '<div class="glass-card rounded-xl p-6 text-center text-slate-400 dark:text-slate-500 col-span-full">暂无 GitHub 仓库配置</div>';

        // 渲染 Gitee 仓库
        const giteeRepos = data.repos.filter(r => r.platform === 'gitee')
          .sort((a, b) => {
            const dateA = a.latestDate ? new Date(a.latestDate).getTime() : 0;
            const dateB = b.latestDate ? new Date(b.latestDate).getTime() : 0;
            return dateB - dateA; // 倒序：最近更新的在前
          });
        document.getElementById('giteeRepos').innerHTML = giteeRepos.length > 0
          ? giteeRepos.map(repo => `
            <div class="glass-card repo-card rounded-xl p-5 cursor-pointer" onclick="window.open('${repo.url}', '_blank')" title="点击打开仓库页面">
              <div class="flex items-start justify-between mb-3">
                <div>
                  <span class="platform-badge bg-red-100 text-red-600 dark:bg-red-500/20 dark:text-red-400">Gitee</span>
                  <h3 class="text-slate-900 dark:text-white font-semibold mt-2">${repo.name}</h3>
                  <p class="text-slate-500 dark:text-slate-400 text-sm">${repo.branch}</p>
                </div>
                <div class="status-dot ${repo.latestSha ? 'bg-emerald-500 dark:bg-emerald-400' : 'bg-amber-500 dark:bg-amber-400'}"></div>
              </div>
              <div class="space-y-2">
                <div class="flex items-center gap-2 text-sm">
                  <span class="text-slate-500 dark:text-slate-500">最新 SHA:</span>
                  <code class="text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-500/10 px-2 py-0.5 rounded text-xs">${repo.latestSha ? repo.latestSha.substring(0, 8) : '未检测'}</code>
                </div>
                ${repo.latestDate ? `<div class="flex items-center gap-2 text-sm">
                  <span class="text-slate-500 dark:text-slate-500">更新时间:</span>
                  <span class="text-slate-600 dark:text-slate-300">${formatRelativeTime(repo.latestDate)}</span>
                </div>` : ''}
              </div>
            </div>
          `).join('')
          : '<div class="glass-card rounded-xl p-6 text-center text-slate-400 dark:text-slate-500 col-span-full">暂无 Gitee 仓库配置</div>';

        // 渲染 GitLab 仓库
        const gitlabRepos = data.repos.filter(r => r.platform === 'gitlab')
          .sort((a, b) => {
            const dateA = a.latestDate ? new Date(a.latestDate).getTime() : 0;
            const dateB = b.latestDate ? new Date(b.latestDate).getTime() : 0;
            return dateB - dateA; // 倒序：最近更新的在前
          });
        document.getElementById('gitlabRepos').innerHTML = gitlabRepos.length > 0
          ? gitlabRepos.map(repo => `
            <div class="glass-card repo-card rounded-xl p-5 cursor-pointer" onclick="window.open('${repo.url}', '_blank')" title="点击打开仓库页面">
              <div class="flex items-start justify-between mb-3">
                <div>
                  <span class="platform-badge bg-orange-100 text-orange-600 dark:bg-orange-500/20 dark:text-orange-400">GitLab</span>
                  <h3 class="text-slate-900 dark:text-white font-semibold mt-2">${repo.name}</h3>
                  <p class="text-slate-500 dark:text-slate-400 text-sm">${repo.branch}</p>
                </div>
                <div class="status-dot ${repo.latestSha ? 'bg-emerald-500 dark:bg-emerald-400' : 'bg-amber-500 dark:bg-amber-400'}"></div>
              </div>
              <div class="space-y-2">
                <div class="flex items-center gap-2 text-sm">
                  <span class="text-slate-500 dark:text-slate-500">最新 SHA:</span>
                  <code class="text-orange-600 dark:text-orange-400 bg-orange-50 dark:bg-orange-500/10 px-2 py-0.5 rounded text-xs">${repo.latestSha ? repo.latestSha.substring(0, 8) : '未检测'}</code>
                </div>
                ${repo.latestDate ? `<div class="flex items-center gap-2 text-sm">
                  <span class="text-slate-500 dark:text-slate-500">更新时间:</span>
                  <span class="text-slate-600 dark:text-slate-300">${formatRelativeTime(repo.latestDate)}</span>
                </div>` : ''}
              </div>
            </div>
          `).join('')
          : '<div class="glass-card rounded-xl p-6 text-center text-slate-400 dark:text-slate-500 col-span-full">暂无 GitLab 仓库配置</div>';

        // 渲染 CNB 仓库
        const cnbRepos = data.repos.filter(r => r.platform === 'cnb')
          .sort((a, b) => {
            const dateA = a.latestDate ? new Date(a.latestDate).getTime() : 0;
            const dateB = b.latestDate ? new Date(b.latestDate).getTime() : 0;
            return dateB - dateA; // 倒序：最近更新的在前
          });
        document.getElementById('cnbRepos').innerHTML = cnbRepos.length > 0
          ? cnbRepos.map(repo => `
            <div class="glass-card repo-card rounded-xl p-5 cursor-pointer" onclick="window.open('${repo.url}', '_blank')" title="点击打开仓库页面">
              <div class="flex items-start justify-between mb-3">
                <div>
                  <span class="platform-badge bg-emerald-100 text-emerald-600 dark:bg-emerald-500/20 dark:text-emerald-400">CNB</span>
                  <h3 class="text-slate-900 dark:text-white font-semibold mt-2">${repo.name}</h3>
                </div>
                <div class="status-dot ${repo.latestBuildId ? 'bg-emerald-500 dark:bg-emerald-400' : 'bg-amber-500 dark:bg-amber-400'}"></div>
              </div>
              <div class="space-y-2">
                <div class="flex items-center gap-2 text-sm">
                  <span class="text-slate-500 dark:text-slate-500">最新构建:</span>
                  <code class="text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-500/10 px-2 py-0.5 rounded text-xs">${repo.latestBuildId || '未检测'}</code>
                </div>
                ${repo.latestDate ? `<div class="flex items-center gap-2 text-sm">
                  <span class="text-slate-500 dark:text-slate-500">构建时间:</span>
                  <span class="text-slate-600 dark:text-slate-300">${formatRelativeTime(repo.latestDate)}</span>
                </div>` : ''}
              </div>
            </div>
          `).join('')
          : '<div class="glass-card rounded-xl p-6 text-center text-slate-400 dark:text-slate-500 col-span-full">暂无 CNB 仓库配置</div>';

      } catch (error) {
        console.error('加载数据失败:', error);
        document.getElementById('githubRepos').innerHTML =
          '<div class="glass-card rounded-xl p-6 text-center text-red-500 dark:text-red-400 col-span-full">加载失败: ' + error.message + '</div>';
        document.getElementById('giteeRepos').innerHTML =
          '<div class="glass-card rounded-xl p-6 text-center text-red-500 dark:text-red-400 col-span-full">加载失败: ' + error.message + '</div>';
        document.getElementById('gitlabRepos').innerHTML =
          '<div class="glass-card rounded-xl p-6 text-center text-red-500 dark:text-red-400 col-span-full">加载失败: ' + error.message + '</div>';
        document.getElementById('cnbRepos').innerHTML =
          '<div class="glass-card rounded-xl p-6 text-center text-red-500 dark:text-red-400 col-span-full">加载失败: ' + error.message + '</div>';
      }
    }

    // 格式化相对时间（如：3天前、刚刚）
    function formatRelativeTime(dateString) {
      if (!dateString) return '';
      const date = new Date(dateString);
      const now = new Date();
      const diffMs = now - date;
      const diffSeconds = Math.floor(diffMs / 1000);
      const diffMinutes = Math.floor(diffSeconds / 60);
      const diffHours = Math.floor(diffMinutes / 60);
      const diffDays = Math.floor(diffHours / 24);

      if (diffSeconds < 60) {
        return '刚刚';
      } else if (diffMinutes < 60) {
        return `${diffMinutes} 分钟前`;
      } else if (diffHours < 24) {
        return `${diffHours} 小时前`;
      } else if (diffDays < 30) {
        return `${diffDays} 天前`;
      } else if (diffDays < 365) {
        const diffMonths = Math.floor(diffDays / 30);
        return `${diffMonths} 个月前`;
      } else {
        const diffYears = Math.floor(diffDays / 365);
        return `${diffYears} 年前`;
      }
    }

    // 页面加载时自动获取数据
    loadData();

    // 每 30 秒自动刷新
    setInterval(loadData, 30000);
  </script>
</body>
